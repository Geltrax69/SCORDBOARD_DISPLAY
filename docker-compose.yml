version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-scoreboard}
      POSTGRES_USER:     ${DB_USER:-scoreboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scoreboard_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scoreboard} -d ${DB_NAME:-scoreboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT:  "8080"
      ENVIRONMENT:  ${ENVIRONMENT:-production}
      DB_HOST:      postgres
      DB_PORT:      "5432"
      DB_USER:      ${DB_USER:-scoreboard}
      DB_PASSWORD:  ${DB_PASSWORD:-scoreboard_secret}
      DB_NAME:      ${DB_NAME:-scoreboard}
      DB_SSLMODE:   disable
      JWT_SECRET:   ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL:  ""
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
